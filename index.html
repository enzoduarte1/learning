<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo HTML corretamente</title>
    <link rel="shortcut icon" type="imagex/png" href="Sem Título-1.ico">
</head>

<body>
    <!-- começa utilizando o comando SVG para determinar o tamanho do gráfico/imagem que será exibido/a. considere esse sendo o pai. -->
    <svg width="500" height="400">
        <!-- o comando rect é utilizado para criar um retângulo, onde width é a largura, height é a altura e fill é a cor de preenchimento. considere esse sendo o filho, ou seja, ele pode pegar 100% do tamanho do pai (svg acima)
         é possível utilizar rect para retângulos
         circle para círculos
         ellipse para ovais/eclipses
         line para linhas
         path para curvas -->
        <rect width="100%" height="100%" fill="#5D0487" stroke="#000000" stroke-width="20" />
        <!--agora definiremos as letras dentro do elemento SVG. x e y são as coordenadas da letra dentro do elemento SVG, 50% em ambos representando que elas estarão no meio do elemento. fill é a cor da letra. text-anchor é o ponto de ancoragem do texto. dominant-baseline é a linha de base dominante -->
        <text x="50%" y="50%" fill="#FFA6B8" font-size="24" font-family="Arial" text-anchor="middle"
            dominant-baseline="middle">
            DUARTE
        </text>
    </svg>
    <svg width="600" height="400">
        <circle cx="50%" cy="50%" r="30%" fill="#E86800" stroke="#000000" stroke-width="10" />
        DUARTE
    </svg>
</body>

</html>
