<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Lista não ordenada</h1>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <h1>Lista ordenada</h1>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <h1>Lista de definição</h1>
    <dl>
        <dt><b>Item 1</b></dt>
        <dd>Descrição do item 1</dd>
        <dt><b>Item 2</b></dt>
        <dd>Descrição do item 2</dd>
    </dl>
</body>

</html>
