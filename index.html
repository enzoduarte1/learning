<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo HTML corretamente</title>
    <link rel="shortcut icon" type="imagex/png" href="Sem Título-1.ico">
</head>

<body>
    <ol>
        <h2>Pratos do dia</h2>
        <li>Feijão com farinha</li>
        <li>Arroz com conector USB-C</li>
        <li>Macarrão com pimenta</li>
    </ol><br>

    <h2>Quantidade disponível de cada prato</h2>
    <table border="1">
        <tr>
            <th>Prato</th>
            <th>Quantidade</th>
        </tr>
        <tr>
            <td align="center">Feijão com farinha</td>
            <td align="center">15</td>
        </tr>
        <tr>
            <td align="center">Arroz com conector USB-C</td>
            <td align="center">4</td>
        </tr>
        <tr>
            <td align="center">Macarrão com pimenta</td>
            <td align="center">7</td>
        </tr>
    </table>
    <form><br>
        <h2>Faça seu pedido</h2>
        <label for="prato">Escolha um prato:</label>
        <select id="prato" name="prato">
            <option value="opcao">Escolha uma opção de prato</option>
            <option value="feijao">Feijão com farinha</option>
            <option value="arroz">Arroz com conector USB-C</option>
            <option value="macarrao">Macarrão com pimenta</option>
        </select>
        <br><br>
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" min="1" max="15">
        <br><br>
        <input type="submit" value="Enviar Pedido">
    </form>
</body>

</html>
